patterns_discovered:
  - id: "PAT-N-3"
    description: "After modifying code in app/ directories, always clear __pycache__ to avoid confusing import errors from stale bytecode"
    context: "Fixed TypeError: Router.__init__() got unexpected keyword argument 'on_startup' by cleaning backend/app/routers/__pycache__"
  - id: "PAT-N-4"
    description: "Repository compound methods (like create_from_csv) maintain transactional atomicity while keeping routers thin and focused on HTTP concerns"
    context: "Implemented CSV upload that creates Scenario + Client + Invoice in single transaction via IScenarioRepository.create_from_csv()"
  - id: "PAT-N-5"
    description: "SQLite-based integration tests are sufficient for validating endpoint logic when PostgreSQL unavailable in development environment"
    context: "All 39 backend tests passed with sqlite+aiosqlite://, verifying CSV upload endpoint behavior without requiring PostgreSQL"
