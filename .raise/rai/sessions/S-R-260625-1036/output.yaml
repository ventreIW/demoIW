patterns:
  - description: "SQLite strips timezone from datetime on storage. Use _utc() guard in all orm_to_domain mappers: dt.replace(tzinfo=UTC) if dt.tzinfo is None. No-op in PostgreSQL."
    context: "sqlalchemy,sqlite,datetime,timezone,mapper,testing"
    type: technical
  - description: "SQLAlchemy with_variant(type, dialect) — both args are SQLAlchemy type objects. Cross-dialect pattern: JSON in ORM models (SQLite compat), JSONB in Alembic migrations (PostgreSQL-native). ORM column type and migration DDL type can differ."
    context: "sqlalchemy,jsonb,json,cross-dialect,orm,migration"
    type: technical
  - description: "Place Base = DeclarativeBase() in infrastructure/database.py (where the async engine lives), not in models.py. Alembic env.py imports Base.metadata from that module for autogenerate."
    context: "sqlalchemy,alembic,base,declarativebase,architecture"
    type: architecture
  - description: "rai gate check must be run from the repo root (where .raise/manifest.yaml lives). Running from a subdirectory produces 'No .raise/manifest.yaml found' errors."
    context: "rai,gate,cli,manifest"
    type: process

corrections:
  - what: "rai-session-start skill does not include a git pull step"
    lesson: "Session start should fetch/pull from origin before loading context bundle. Missing pull caused stale context (s1.2 and s1.3 not shown as merged when they were). Add git pull origin {dev_branch} as Step 0 before working tree check."
  - what: "Design code examples used Text().with_variant('jsonb', 'postgresql') — both args must be SQLAlchemy types, not strings"
    lesson: "Design ORM code examples must be runnable, not illustrative. One import-time test at design phase would have caught this. Future backend story designs: verify ORM column type examples compile before committing design doc."

