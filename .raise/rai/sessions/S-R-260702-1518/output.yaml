patterns:
  - description: "Seed-based generators must derive UUIDs from the seeded RNG (rng.bytes(16)), never uuid.uuid4() — uuid4 reads OS entropy and breaks determinism even when numeric draws are seeded"
    context: "determinism,procedural-generation,numpy,uuid,testing"
    type: technical
  - description: "Synthetic-data generators for ML demos must make labelled attributes causal, not decorative — if a category label doesn't drive outcomes, downstream ML finds no signal and the demo underperforms"
    context: "synthetic-data,ml,demo,causality,scoring"
    type: technical
  - description: "Under mypy strict, treat pandas as ignore_missing_imports at its module boundary (pandas-stubs too noisy for df-heavy code); confine DataFrames in a frozen VO so Any doesn't leak into domain"
    context: "mypy,strict,pandas,typing,value-object"
    type: technical
  - description: "uv-managed venvs have no pip and drift from requirements.txt; install via 'uv pip install --python .venv/bin/python -r requirements.txt' to add deps and re-sync"
    context: "uv,venv,dependencies,backend,setup"
    type: codebase
corrections:
  - what: "User asked 'did you assume some probability distribution?' after implement — surfaced that payment pattern was decorative"
    lesson: "For ML-demo synthetic data, proactively verify that labelled attributes causally drive outcomes; realism IS the product for a catalog asset"
