narrative: |
  ## Decisions
  - Moved GenerationParams to domain/value_objects to break import circular between procedural_generator and generate_dataset
  - Changed GenerateDataset constructor to accept ProceduralGenerator and LLMEnrichmentService instances via dependency injection
  - Set default batch size to 20 based on empirical testing with OpenRouter API and typical prompt sizes (~150 tokens per record)
  - Implemented graceful degradation: if LLM call fails or returns invalid/mismatched data, preserve original client data for that batch
  - Documented the Starlette/FastAPI known issue as a known limitation in dev/known-issues/001.md
  ## Research
  - Verified that the LLMEnrichmentService batching logic correctly handles partial batches and failure cases (unit tests in test_llm_enrichment_service.py)
  - Confirmed that the GenerateDataset use case correctly wires the procedural generator and enrichment service (test in test_generate_dataset.py)
  - Checked that the epic scope is updated and the story branch is merged and deleted
