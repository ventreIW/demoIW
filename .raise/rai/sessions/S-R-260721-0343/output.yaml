patterns:
  - description: "Cuando un segundo desarrollador está bloqueado por un CONTRATO y no por lógica, secuenciar el contrato primero y empujarlo, aunque contradiga el orden risk-first."
    context: "planning,parallel-work,contracts,handoff"
    type: process
  - description: "Un subconjunto que cumple un umbral debe probarse por MINIMALIDAD, no sólo por cumplir el umbral. 'Contiene >=80% del valor' es cierto para la cartera entera."
    context: "testing,pareto,off-by-one,thresholds"
    type: technical
  - description: "Verificar que una propiedad estadística nombrada realmente existe en los datos antes de construir una feature sobre ella. 'Pareto' implicaba 20/80; medido, el 20% superior concentra 40%."
    context: "statistics,assumptions,measurement,synthetic-data"
    type: process
  - description: "El texto generado para usuarios debe enmarcar un hecho según el SIGNO de su contribución, no sólo renderizar su valor. Reglas individualmente correctas produjeron 'Buen perfil de pago: facturas con hasta 40 días de atraso'."
    context: "explainability,ui-text,ml,phrasing"
    type: technical
  - description: "Revisar APIs públicas sin uso ANTES del close, no en el architecture-review gate. Tres stories seguidas enviaron una cada una; hacerlo criterio de aceptación atrapó la cuarta a tiempo."
    context: "beck-r2,yagni,dead-code,acceptance-criteria"
    type: process
