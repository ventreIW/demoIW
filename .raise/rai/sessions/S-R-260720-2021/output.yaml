narrative: |
  ## Decisions
  - ADR-006: el modelo predice un desenlace de cobro simulado a 90 días, no una etiqueta derivada
    de payment_history_pattern. Esa columna genera todo el dataset y está en el registro del
    cliente; usarla daría ~100% de accuracy leyendo la respuesta. Guard por test, no por comentario.
  - ADR-007: scikit-learn + LogisticRegression, entrenado bajo demanda, sin artefacto persistido.
    La restricción vinculante es RF-02.3 (explicación por predicción), no el accuracy.
  - ADR-007 Amendment 1: C=0.01. El canary detectó colinealidad (days_overdue_max/mean r=0.872)
    que hacía volar los signos en 19 de 27 configuraciones. Ridge fuerte los estabilizó (0/45) y
    ADEMÁS subió la media de AUC de 0.716 a ~0.735.
  - Umbrales de categoría fijos (40/70) en vez de terciles por escenario, para que la banda de un
    cliente no dependa de quién más está en la cartera.
  - Mínimo de escenario 200 (no 50): a n=100 el AUC medido va de 0.286 a 1.000.
  ## Research
  - Prototipos ejecutados durante diseño en s4.3 y s4.4 — encontraron escalado obligatorio, ruido
    a n=100, distribución de scores, y que 26.2% de clientes tendrían "antigüedad" repetida dos veces.
  ## Artifacts
  - backend/app/{ports/scoring_port.py, adapters/scoring/*, application/services/*, domain/value_objects/*}
  - dev/decisions/adr-006-*, adr-007-* (con Amendment 1)
  - work/epics/e4-intelligence-engine/{brief,scope,design,pull-board}.md + stories s4.2/s4.3/s4.4
  - 9 PRs abiertos y mergeados (#1-#9)
  ## Branch State
  - main @ 77043f6, verde, CI corriendo en push y PR
  - story/s4.4/score-explanation empujada con 4 commits (scope, design, plan, gitignore)
next_session_prompt: |
  Retomar en s4.4 T1: ScoreExplainer (agrupación, ranking, materialidad). El plan está completo en
  work/epics/e4-intelligence-engine/stories/s4.4-plan.md y la rama story/s4.4/score-explanation ya
  está empujada con scope, design y plan.

  El test que importa en T1 es test_grouping_happens_before_ranking: si la agrupación de antigüedad
  se aplica al renderizar en vez de antes del ranking, "antigüedad" pierde un lugar que debía ganar.
  Es el mismo problema de peso dividido que desestabilizó los coeficientes en s4.3.

  T3 es donde se juzga la historia: imprimir ~10 explicaciones reales y LEERLAS. Los tests unitarios
  prueban que las reglas se cumplen; solo leer la salida dice si es español que un gestor de cobranza
  aceptaría. Registrar la muestra en el retrospective.

  ANTES DE PROPONER TRABAJO NUEVO: la OPENROUTER_API_KEY sigue sin existir y bloquea 3 de 6 módulos
  (s4.8, E5 s5.4, E6 s6.3) contra un demo el 2026-08-14 — 24 días. Es procurement, no código, y es
  lo de mayor apalancamiento en el proyecto.

  Nano y Renata tienen trabajo desbloqueado (s4.9/s4.6 y s4.7). El board está al día a 2026-07-21;
  mantenerlo así en cada transición, no al final.
