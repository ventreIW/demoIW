patterns:
  - description: "Un canary debe afirmar la DIRECCIÓN de una relación aprendida, no que el entrenamiento tuvo éxito. Un test de 'entrena y AUC aceptable' habría pasado 19 de 27 configuraciones rotas."
    context: "ml,canary,testing,explainability"
    type: technical
  - description: "Features colineales destruyen las explicaciones basadas en coeficientes aunque el ranking siga bien. Si se eligió un modelo lineal POR su explicabilidad, medir correlación antes de confiar en la atribución."
    context: "ml,collinearity,regularization"
    type: technical
  - description: "Gatear una métrica ruidosa en dos partes: un piso por corrida que detecta un sistema roto, más una media entre semillas que es la señal real."
    context: "testing,metrics,quality-gates"
    type: process
  - description: "Prototipar durante el DISEÑO cuando el diseño depende de números desconocidos. En s4.3 esto encontró tres cosas que habrían sido sorpresas de implementación."
    context: "design,prototype,measurement"
    type: process
  - description: "Los criterios de aceptación estructurales (límites de import, dependencias entre capas) deben ser tests ejecutables, no líneas de checklist. El AC #15 de s4.3 estaba escrito y fue violado dentro de la misma historia."
    context: "acceptance-criteria,architecture,testing"
    type: process
corrections:
  - what: "Escribí en el pull-board de E4 la regla 'actualizar en cada transición de estado' tras criticar a E3 por lo mismo, y luego dejé el board mostrando s4.3 como 'backlog' con su PR abierto y verde."
    lesson: "Escribir una regla no la hace cumplirse. El arreglo estructural es un check que corre, no una línea que se escribe."
  - what: "Violé el AC #15 de s4.3 (sin sklearn fuera de adapters/scoring/) importando sklearn.metrics en la capa de dominio. Lo detectó la suite completa, no el AC."
    lesson: "Un criterio de aceptación sobre estructura debe expresarse como test en tiempo de diseño."
  - what: "Un script de limpieza con regex borró ambas copias de una constante en vez de la duplicada, rompiendo el módulo hasta la siguiente corrida de tests."
    lesson: "Preferir edición dirigida sobre regex de archivo completo."
