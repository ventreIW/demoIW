name: CI

on:
  pull_request:
    branches:
      - main
  # Also gate direct pushes to main. Without this, commits that bypass a pull
  # request are never checked — which is how 112 lint violations and a leaking
  # test accumulated on main unnoticed (see PRs #1 and #2).
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend (typecheck · lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --run

  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: mypy app/
      - run: pytest tests/ -v --tb=short
